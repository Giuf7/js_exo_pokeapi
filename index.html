<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeAPI</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/script.js" defer></script>
</head>

<body>

    <a href="index.html">
        <div class="header">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/249.svg"
                height="175" width="425">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Pokemon_logo.png" height="175" width="425">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/250.svg"
                height="175" width="425">
        </div>
    </a>

    <div name="btnList" class="btnList">
        <button class="previous">Previous</button>
        <input class="searchInput" placeholder="Search by ID">
        <button class="next">Next</button>
    </div>

    <div id="pokedex-container"></div>

    <div id="pokemon-popover" class="popover hidden">
        <div id="popover-body"></div>
    </div>
</body>

</html>
